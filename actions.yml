name: Run Actions Automation

on:
  schedule:
    - cron: '30 4 * * *'    # 10:00 AM IST (4:30 UTC)
    - cron: '30 12 * * *'   # 6:00 PM IST (12:30 UTC)
  workflow_dispatch:

concurrency:
  group: actions-automation
  cancel-in-progress: false

jobs:
  run-actions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Actions.py
        env:
          ASHRITHA_SECRET_KEY: ${{ secrets.ASHRITHA_SECRET_KEY }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          USERNAME: ${{ secrets.USERNAME }}
          METABASE_URL: ${{ secrets.METABASE_URL }}

        run: |
          echo "=============================="
          echo "Workflow triggered at UTC: $(date -u)"
          echo "Current branch: $GITHUB_REF"
          echo "Repository path: $GITHUB_WORKSPACE"
          echo "=============================="
          echo "🚀 Starting Actions.py..."
          echo "Using Metabase URL: ${METABASE_URL:0:25}****"
          echo "Using USERNAME variable: ${USERNAME:+[SET]}"

          python Actions.py

          echo "✅ Actions.py executed successfully."